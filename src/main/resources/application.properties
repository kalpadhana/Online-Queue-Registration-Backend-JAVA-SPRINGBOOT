
# Database Configuration - Switched to H2 (In-Memory) because MySQL is not running
spring.datasource.url=jdbc:h2:mem:smartqueue;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

